{% extends "layout.html" %}

{% block content %}
    <div class="bg-white rounded-xl shadow-lg p-6 md:p-10 border-t-4 border-yellow-500">
        <h1 class="text-3xl font-bold mb-8 text-gray-800">✏️ Editar Publicación</h1>
        
        <form method="POST" enctype="multipart/form-data" class="space-y-6">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Título</label>
                    <input type="text" name="titulo" required value="{{ post.titulo }}"
                           class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-yellow-500 outline-none">
                </div>
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Cambiar Imagen (Opcional)</label>
                    <input type="file" name="imagen" accept="image/*"
                           class="w-full p-2 border border-gray-300 rounded-lg text-sm text-gray-500">
                    {% if post.imagen %}
                        <p class="text-xs text-green-600 mt-1">✅ Imagen actual guardada. Sube otra solo si quieres cambiarla.</p>
                    {% endif %}
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Contenido</label>
                <textarea name="contenido" rows="12" required 
                          class="w-full p-4 border rounded-lg focus:ring-2 focus:ring-yellow-500 outline-none font-sans">{{ post.contenido }}</textarea>
            </div>

            <div class="flex justify-between items-center pt-4">
                <a href="/post/{{ post.id }}" class="text-gray-500 hover:text-gray-700">Cancelar</a>
                <button type="submit" class="bg-yellow-500 text-white font-bold py-3 px-8 rounded-lg hover:bg-yellow-600 transition shadow-lg">
                    Guardar Cambios
                </button>
            </div>
        </form>
    </div>
{% endblock %}
