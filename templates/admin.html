{% extends "layout.html" %}

{% block content %}
    <div class="max-w-2xl mx-auto bg-white p-8 rounded-lg shadow-lg border-t-4 border-indigo-600">
        <h2 class="text-2xl font-bold mb-6 text-gray-800">Crear Nuevo Artículo</h2>

        <form method="POST" class="space-y-5">
            <div>
                <label class="block text-gray-700 font-bold mb-2">Título del Artículo</label>
                <input type="text" name="titulo" required
                       class="w-full p-3 border border-gray-300 rounded focus:ring-2 focus:ring-indigo-500 outline-none"
                       placeholder="Ej: Avances en mi proyecto PolyStamp">
            </div>

            <div>
                <label class="block text-gray-700 font-bold mb-2">Contenido</label>
                <textarea name="contenido" rows="12" required
                          class="w-full p-3 border border-gray-300 rounded focus:ring-2 focus:ring-indigo-500 outline-none font-mono text-sm"
                          placeholder="Escribe aquí tu historia..."></textarea>
            </div>

            <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 rounded hover:bg-indigo-700 transition transform hover:scale-105">
                Publicar Ahora
            </button>
        </form>
    </div>
{% endblock %}
