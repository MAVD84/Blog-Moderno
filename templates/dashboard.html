{% extends "layout.html" %}

{% block content %}
    <div class="bg-white rounded-xl shadow-lg p-6 md:p-10 border border-gray-100">
        <h1 class="text-3xl font-bold mb-8 text-gray-800">Nueva Publicación</h1>

        <form method="POST" enctype="multipart/form-data" class="space-y-6">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Título</label>
                    <input type="text" name="titulo" required
                           class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"
                           placeholder="Título llamativo...">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Imagen de Portada (Opcional)</label>
                    <input type="file" name="imagen" accept="image/*"
                           class="w-full p-2 border border-gray-300 rounded-lg text-sm text-gray-500
                                  file:mr-4 file:py-2 file:px-4
                                  file:rounded-full file:border-0
                                  file:text-sm file:font-semibold
                                  file:bg-indigo-50 file:text-indigo-700
                                  hover:file:bg-indigo-100">
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Contenido</label>
                <textarea name="contenido" rows="12" required
                          class="w-full p-4 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none font-sans"
                          placeholder="Escribe tu historia aquí..."></textarea>
            </div>

            <div class="flex justify-end">
                <button type="submit" class="bg-indigo-600 text-white font-bold py-3 px-8 rounded-lg hover:bg-indigo-700 transition shadow-lg hover:shadow-xl">
                    Publicar
                </button>
            </div>
        </form>
    </div>
{% endblock %}
